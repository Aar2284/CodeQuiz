<!DOCTYPE html>
<html>
<head>
    <title>Add Options</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">

        <h3 class="text-center mb-4">Add Options to Question</h3>

        <form method="POST">
            {% csrf_token %}

            <!-- Select Question -->
            <div class="mb-3">
                <label class="form-label">Select Question</label>
                {{ form.question }}
            </div>

            <!-- Dynamic Options Container -->
            <div id="options-container">

                <div class="option-group border rounded p-3 mb-3">
                    <div class="mb-2">
                        <label class="form-label">Option Text</label>
                        <input type="text" name="option_text" class="form-control" required>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" name="is_correct" class="form-check-input">
                        <label class="form-check-label">Correct Answer</label>
                    </div>
                </div>

            </div>

            <!-- Add Option Button -->
            <div class="mb-3">
                <button type="button" class="btn btn-outline-primary" onclick="addOption()">
                    + Add Another Option
                </button>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Save Options
                </button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">
                Back to Dashboard
            </a>
        </div>

    </div>
</div>

<script>
function addOption() {
    const container = document.getElementById('options-container');

    const newOption = document.createElement('div');
    newOption.classList.add('option-group', 'border', 'rounded', 'p-3', 'mb-3');

    newOption.innerHTML = `
        <div class="mb-2">
            <label class="form-label">Option Text</label>
            <input type="text" name="option_text" class="form-control" required>
        </div>
        <div class="form-check">
            <input type="checkbox" name="is_correct" class="form-check-input">
            <label class="form-check-label">Correct Answer</label>
        </div>
    `;

    container.appendChild(newOption);
}
</script>

</body>
</html>
