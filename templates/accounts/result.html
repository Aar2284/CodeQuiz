<!DOCTYPE html>
<html>
<head>
    <title>Your Results - Enterprise Quiz System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; font-family: 'Poppins', sans-serif; background-color: #0F172A; color: #F1F5F9; display: flex; align-items: center; justify-content: center; }
        .result-card { background: #1E293B; border-radius: 24px; padding: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 600px; width: 90%; text-align: center; border: 1px solid #334155; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #2563EB; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 30px; background: rgba(37, 99, 235, 0.1); box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }
        .score-big { font-size: 2.5rem; font-weight: 800; color: #60A5FA; line-height: 1; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-item { background: #334155; padding: 15px; border-radius: 16px; border: 1px solid #475569; }
        .stat-label { font-size: 0.85rem; color: #94A3B8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: 600; color: #F1F5F9; }
        .btn-glow { background-color: #2563EB; color: white; border: none; border-radius: 30px; padding: 15px 40px; font-weight: 600; font-size: 1.1rem; text-decoration: none; display: inline-block; transition: 0.3s ease; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .btn-glow:hover { background-color: #1D4ED8; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.6); color: white; }
    </style>
</head>
<body>
    <div class="result-card">
        <div class="mb-4">
            <span style="font-size: 3rem;">??</span>
            <h2 class="fw-bold mt-2">Quiz Completed!</h2>
            <p style="color: #94A3B8;">Results for: <strong>{{ attempt.quiz.title }}</strong></p>
        </div>
        <div class="score-circle">
            <div class="score-big">{{ attempt.percentage|floatformat:0 }}%</div>
            <div style="font-size: 0.8rem; font-weight: 600;">SCORE</div>
        </div>
        <div class="stat-grid">
            <div class="stat-item"><div class="stat-label">Marks Obtained</div><div class="stat-value text-success">{{ attempt.score }}</div></div>
            <div class="stat-item"><div class="stat-label">Total Marks</div><div class="stat-value">{{ attempt.total_marks }}</div></div>
            <div class="stat-item"><div class="stat-label">Questions</div><div class="stat-value">{{ attempt.quiz.question_set.count }}</div></div>
            <div class="stat-item"><div class="stat-label">Global Rank</div><div class="stat-value" style="color: #FBBF24;">#{{ attempt.rank }}</div></div>
        </div>
        <a href="{% url 'student_dashboard' %}" class="btn-glow">?? Back to Dashboard</a>
    </div>
</body>
</html>
