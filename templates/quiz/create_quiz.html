<!DOCTYPE html>
<html>
<head>
    <title>Create Quiz - Enterprise Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background-color: #0F172A;
            color: #F1F5F9;
        }

        .navbar-custom {
            background-color: #1E293B;
        }

        .form-card {
            background: #1E293B;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .form-control {
            background-color: #0F172A;
            border: 1px solid #334155;
            color: #F1F5F9;
        }

        .form-control:focus {
            background-color: #0F172A;
            border-color: #2563EB;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.4);
            color: #F1F5F9;
        }

        .form-label {
            color: #94A3B8;
        }

        .btn-primary-custom {
            background-color: #2563EB;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s ease;
            color: white;
        }

        .btn-primary-custom:hover {
            background-color: #1D4ED8;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.6);
        }

        .form-switch .form-check-input {
            background-color: #334155;
            border: none;
        }

        .form-switch .form-check-input:checked {
            background-color: #2563EB;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom px-4">
    <a class="navbar-brand fw-bold" href="#">Enterprise Quiz</a>
    <div class="ms-auto">
        <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-light me-2">Back</a>
        <a href="{% url 'logout' %}" class="btn btn-primary-custom">Logout</a>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center py-5">

    <div class="form-card col-md-8">

        <h3 class="mb-4 fw-bold text-center">Create New Quiz</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">Quiz Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">Time Limit (Minutes)</label>
                    <input type="number" name="timer" class="form-control" required>
                </div>

                <div class="col-md-6 mb-4">
                    <label class="form-label">Negative Marking</label>
                    <input type="number" step="0.1" name="negative_marking" class="form-control" value="0">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Total Marks</label>
                <input type="number" name="total_marks" class="form-control" required>
            </div>

            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" name="is_published">
                <label class="form-check-label">Publish Immediately</label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary-custom">
                    Create Quiz
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
