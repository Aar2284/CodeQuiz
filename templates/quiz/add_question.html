<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #0F172A;
    color: #F1F5F9;
    font-family: 'Poppins', sans-serif;
}

.card-custom {
    background: #1E293B;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}

.btn-custom {
    background-color: #2563EB;
    border: none;
    border-radius: 30px;
    padding: 8px 18px;
    font-weight: 600;
}

.btn-custom:hover {
    background-color: #1D4ED8;
}

.form-control {
    background-color: #334155;
    border: none;
    color: white;
}

.form-control:focus {
    background-color: #475569;
    color: white;
    box-shadow: none;
}
</style>
</head>

<body>

<div class="container mt-5" style="max-width:700px;">

    <div class="card-custom">

        <h3 class="mb-4">Add Question to "{{ quiz.title }}"</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Question Text</label>
                <textarea name="question_text" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label>Marks</label>
                <input type="number" name="marks" class="form-control" value="1" required>
            </div>

            <hr>

            <div class="mb-3">
                <label>Option 1</label>
                <input type="text" name="option1" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 2</label>
                <input type="text" name="option2" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 3</label>
                <input type="text" name="option3" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Option 4</label>
                <input type="text" name="option4" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Select Correct Option</label>
                <select name="correct_option" class="form-control" required>
                    <option value="0">Option 1</option>
                    <option value="1">Option 2</option>
                    <option value="2">Option 3</option>
                    <option value="3">Option 4</option>
                </select>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-light">
                    Back
                </a>

                <button type="submit" class="btn btn-custom text-white">
                    Save Question
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
