<!DOCTYPE html>
<html>
<head>
    <title>Enter Quiz Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-5" style="width: 400px; border-radius: 20px;">

    <div class="text-center mb-4">
        <h3 class="fw-bold">Join Quiz</h3>
        <p class="text-muted">Enter the quiz code provided by your teacher</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Quiz Code</label>
            <input type="text" 
                   name="quiz_code" 
                   class="form-control text-center fs-5" 
                   placeholder="e.g. AB12CD" 
                   required>
        </div>

        {% if error %}
            <div class="alert alert-danger text-center">
                {{ error }}
            </div>
        {% endif %}

        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
                Start Quiz
            </button>
        </div>
    </form>

    <div class="text-center mt-4">
        <a href="{% url 'student_dashboard' %}" class="text-decoration-none">
            ← Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
