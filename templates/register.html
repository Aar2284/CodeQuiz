{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - Enterprise Quiz System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/auth.css' %}" rel="stylesheet">
</head>

<body class="auth-page">

<div class="login-card auth-card">

    <div class="text-center mb-4">
        <h3 class="fw-bold">Create Account</h3>
        <p class="auth-subtitle">Join the Enterprise Quiz platform</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-control" required>
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password1" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="password2" required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary-custom auth-btn text-white">
                Register
            </button>
        </div>

    </form>

    <div class="text-center mt-4">
        <small>
            Already have an account?
            <a href="{% url 'login' %}" class="link-style">Login</a>
        </small>
    </div>

</div>

</body>
</html>
